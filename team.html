<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Portal — ZOLA Nail Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Josefin+Sans:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    body { background:var(--soft-white); }
    .login-wrap { max-width:400px; margin:0 auto; padding:7rem 1.5rem 3rem; }
    .login-card { background:#fff; border:1px solid rgba(196,168,130,0.18); padding:2.5rem 2rem; }
    .ph { font-family:'Syne',serif; font-size:2rem; color:var(--espresso); margin-bottom:0.25rem; font-weight:400; }
    .ps { font-family:'Josefin Sans',sans-serif; font-size:0.84rem; color:var(--latte); margin-bottom:1.75rem; }
    .pf label { display:block; font-family:'Josefin Sans',sans-serif; font-size:0.65rem; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--latte); margin-bottom:0.35rem; }
    .pf input { width:100%; border:1px solid rgba(196,168,130,0.22); background:var(--soft-white); font-family:'Josefin Sans',sans-serif; font-size:0.88rem; color:var(--espresso); padding:0.6rem 0.875rem; outline:none; box-sizing:border-box; margin-bottom:1.1rem; }
    .pf input:focus { border-color:var(--champagne); }
    .btn-l { width:100%; background:var(--champagne); color:var(--espresso); border:none; padding:0.85rem; font-family:'Josefin Sans',sans-serif; font-size:0.75rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; }
    .btn-l:hover { background:#b8924a; }
    .lerr { background:rgba(180,50,50,0.07); border:1px solid rgba(180,50,50,0.2); color:#b43232; font-family:'Josefin Sans',sans-serif; font-size:0.8rem; padding:0.6rem 0.875rem; margin-bottom:1rem; display:none; }
    #team-portal { display:none; }
    .t-nav { background:var(--espresso); padding:0.75rem 0; position:sticky; top:0; z-index:50; }
    .t-nav-inner { max-width:900px; margin:0 auto; padding:0 1.5rem; display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
    .t-nav-logo { font-family:'Syne',serif; font-size:1.2rem; color:var(--champagne); text-decoration:none; }
    .t-nav-links { display:flex; gap:1.25rem; }
    .t-nav-links button { background:none; border:none; font-family:'Josefin Sans',sans-serif; font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--latte); cursor:pointer; }
    .t-nav-links button.active { color:var(--champagne); }
    .t-content { max-width:900px; margin:0 auto; padding:2rem 1.5rem 4rem; }
    .t-tab { display:none; }
    .t-tab.active { display:block; }
    .t-card { background:#fff; border:1px solid rgba(196,168,130,0.15); padding:1.5rem; margin-bottom:1rem; }
    .t-card-title { font-family:'Josefin Sans',sans-serif; font-size:0.62rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--latte); margin-bottom:1rem; }
    .appt-block { border-left:3px solid var(--champagne); padding:0.875rem 1.25rem; margin-bottom:0.75rem; background:rgba(196,168,130,0.04); }
    .appt-time { font-family:'Syne',serif; font-size:1.35rem; color:var(--espresso); }
    .appt-client { font-family:'Josefin Sans',sans-serif; font-size:0.88rem; font-weight:600; color:var(--espresso); margin-top:0.1rem; }
    .appt-service { font-family:'Josefin Sans',sans-serif; font-size:0.8rem; color:var(--latte); }
    .appt-flag { display:inline-block; background:rgba(196,168,130,0.1); color:var(--champagne); font-family:'Josefin Sans',sans-serif; font-size:0.62rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:0.15rem 0.5rem; margin-top:0.35rem; }
    .appt-flag.allergy { background:rgba(180,50,50,0.1); color:#b43232; }
    .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:0.5rem; }
    .week-day { text-align:center; padding:0.75rem 0.25rem; background:var(--soft-white); border:1px solid rgba(196,168,130,0.12); }
    .week-day-label { font-family:'Josefin Sans',sans-serif; font-size:0.6rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--latte); }
    .week-day-count { font-family:'Syne',serif; font-size:1.75rem; color:var(--champagne); margin-top:0.1rem; }
    .week-day.today { border-color:var(--champagne); background:rgba(196,168,130,0.06); }
    .msg-row { border-bottom:1px solid rgba(196,168,130,0.1); padding:0.875rem 0; }
    .msg-from { font-family:'Josefin Sans',sans-serif; font-size:0.65rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--latte); }
    .msg-body { font-family:'Josefin Sans',sans-serif; font-size:0.85rem; color:var(--espresso); margin-top:0.25rem; }
    .msg-time-s { font-family:'Josefin Sans',sans-serif; font-size:0.65rem; color:rgba(139,106,62,0.5); }
    .date-nav { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; }
    .date-nav button { background:none; border:1px solid rgba(196,168,130,0.22); padding:0.4rem 0.75rem; font-family:'Josefin Sans',sans-serif; font-size:0.78rem; cursor:pointer; color:var(--espresso); }
    .date-nav button:hover { border-color:var(--champagne); }
    .date-display { font-family:'Syne',serif; font-size:1.5rem; color:var(--espresso); }
    @media (max-width:550px) { .week-grid { grid-template-columns:repeat(4,1fr); } }
  </style>
</head>
<body>

<div id="team-login">
  <nav class="nav" id="nav">
    <a href="index.html" class="nav-logo"><span style="font-weight:200">Z</span><span style="font-weight:400">O</span><span style="font-weight:600">L</span><span style="font-weight:800">A</span></a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="team.html" style="color:var(--champagne)">Team Portal</a>
    </div>
    <button class="nav-hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </nav>
  <div class="nav-mobile" id="nav-mobile"><a href="index.html">Home</a></div>
  <div class="login-wrap">
    <div class="login-card">
      <h1 class="ph">Team Portal</h1>
      <p class="ps">Sign in with your Zola staff credentials.</p>
      <div class="lerr" id="lerr"></div>
      <div class="pf"><label>Email</label><input type="email" id="st-email" placeholder="you@zluxnails.com" /></div>
      <div class="pf"><label>Password</label><input type="password" id="st-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doStaffLogin()" /></div>
      <button class="btn-l" onclick="doStaffLogin()">Sign In</button>
    </div>
  </div>
</div>

<div id="team-portal">
  <nav class="t-nav">
    <div class="t-nav-inner">
      <a href="index.html" class="t-nav-logo">ZOLA</a>
      <div style="font-family:'Josefin Sans',sans-serif;font-size:0.75rem;color:var(--latte);">Team Portal — <span id="staff-name-display"></span></div>
      <div class="t-nav-links">
        <button onclick="showTTab('t-today')" class="active" id="tn-today">Today</button>
        <button onclick="showTTab('t-week')" id="tn-week">Week</button>
        <button onclick="showTTab('t-messages')" id="tn-messages">Messages</button>
        <button onclick="staffLogout()" style="color:rgba(139,106,62,0.4);">Sign Out</button>
      </div>
    </div>
  </nav>

  <div class="t-content">

    <!-- TODAY'S SCHEDULE -->
    <div class="t-tab active" id="t-today">
      <div class="date-nav">
        <button onclick="changeDay(-1)">←</button>
        <div class="date-display" id="current-date-label">Today</div>
        <button onclick="changeDay(1)">→</button>
        <button onclick="goToday()" style="font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;">Today</button>
      </div>
      <div id="today-schedule">
        <div style="font-family:'Josefin Sans',sans-serif;font-size:0.85rem;color:var(--latte);">Loading schedule…</div>
      </div>
    </div>

    <!-- WEEK VIEW -->
    <div class="t-tab" id="t-week">
      <h2 style="font-family:'Syne',serif;font-size:1.75rem;color:var(--espresso);margin-bottom:1.5rem;">This Week</h2>
      <div class="week-grid" id="week-grid"></div>
    </div>

    <!-- MESSAGES -->
    <div class="t-tab" id="t-messages">
      <h2 style="font-family:'Syne',serif;font-size:1.75rem;color:var(--espresso);margin-bottom:1.5rem;">Messages</h2>
      <div class="t-card">
        <div id="staff-messages"></div>
      </div>
    </div>

  </div>
</div>

<script>
let staffToken = '';
let staffId = null;
let currentDate = new Date().toISOString().slice(0, 10);

function lerr(msg) {
  const e = document.getElementById('lerr');
  e.textContent = msg;
  e.style.display = msg ? 'block' : 'none';
}

async function doStaffLogin() {
  lerr('');
  const email = document.getElementById('st-email').value.trim();
  const pass = document.getElementById('st-pass').value;
  if (!email || !pass) return lerr('Email and password required.');
  try {
    const r = await fetch('/api/staff-auth', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ email, password: pass }),
    });
    const d = await r.json();
    if (!r.ok) return lerr(d.error || 'Login failed.');
    staffToken = d.token;
    staffId = d.staff.id;
    localStorage.setItem('zlux_staff_token', staffToken);
    showPortal(d.staff);
  } catch { lerr('Network error.'); }
}

function showPortal(staff) {
  document.getElementById('team-login').style.display = 'none';
  document.getElementById('team-portal').style.display = 'block';
  document.getElementById('staff-name-display').textContent = staff.name;
  loadSchedule(currentDate);
  loadWeek();
  loadStaffMessages();
}

function staffLogout() {
  localStorage.removeItem('zlux_staff_token');
  staffToken = '';
  document.getElementById('team-login').style.display = '';
  document.getElementById('team-portal').style.display = 'none';
}

function showTTab(id) {
  document.querySelectorAll('.t-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  ['today','week','messages'].forEach(n=>document.getElementById('tn-'+n)?.classList.remove('active'));
  const map={'t-today':'tn-today','t-week':'tn-week','t-messages':'tn-messages'};
  if(map[id]) document.getElementById(map[id]).classList.add('active');
}

function changeDay(delta) {
  const d = new Date(currentDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  currentDate = d.toISOString().slice(0, 10);
  loadSchedule(currentDate);
}

function goToday() {
  currentDate = new Date().toISOString().slice(0, 10);
  loadSchedule(currentDate);
}

async function loadSchedule(date) {
  document.getElementById('current-date-label').textContent = new Date(date+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const container = document.getElementById('today-schedule');
  container.innerHTML = '<div style="font-family:\'Jost\',sans-serif;font-size:0.85rem;color:var(--latte);">Loading…</div>';
  if (!staffToken) return;
  try {
    const r = await fetch('/api/staff-data?date='+date, { headers:{'Authorization':'Bearer '+staffToken} });
    const d = await r.json();
    if (!r.ok) { container.innerHTML = '<div style="font-family:\'Jost\',sans-serif;font-size:0.85rem;color:#b43232;">Failed to load schedule.</div>'; return; }

    // Populate week while we're at it
    if (d.week) populateWeek(d.week);

    if (!d.schedule.length) {
      container.innerHTML = '<div style="font-family:\'Jost\',sans-serif;font-size:0.85rem;color:var(--latte);">No appointments scheduled for this day.</div>';
      return;
    }

    container.innerHTML = d.schedule.map(a => {
      const allergyFlag = a.allergies ? `<span class="appt-flag allergy">Allergies: ${a.allergies}</span>` : '';
      const sensFlag = a.sensitivities ? `<span class="appt-flag">Sensitivities: ${a.sensitivities}</span>` : '';
      const tierBadge = a.tier ? `<span class="appt-flag">${a.tier.replace('_',' ')}</span>` : '';
      return `<div class="appt-block">
        <div class="appt-time">${a.appointment_time}</div>
        <div class="appt-client">${a.client_name || 'Guest'}</div>
        <div class="appt-service">${a.service}${a.notes ? ' · '+a.notes : ''}</div>
        <div style="margin-top:0.4rem;display:flex;gap:0.4rem;flex-wrap:wrap;">${tierBadge}${allergyFlag}${sensFlag}</div>
        <div style="font-family:'Josefin Sans',sans-serif;font-size:0.68rem;color:rgba(139,106,62,0.5);margin-top:0.4rem;">Status: ${a.status}</div>
      </div>`;
    }).join('');
  } catch { container.innerHTML = '<div style="color:#b43232;font-family:\'Jost\',sans-serif;font-size:0.85rem;">Error loading schedule.</div>'; }
}

async function loadWeek() {
  if (!staffToken) return;
  try {
    const r = await fetch('/api/staff-data', { headers:{'Authorization':'Bearer '+staffToken} });
    const d = await r.json();
    if (r.ok && d.week) populateWeek(d.week);
  } catch (_) {}
}

function populateWeek(week) {
  const today = new Date().toISOString().slice(0,10);
  const grid = document.getElementById('week-grid');
  if (!grid) return;
  grid.innerHTML = week.map(w => {
    const d = new Date(w.date+'T00:00:00');
    const dayLabel = d.toLocaleDateString('en-US',{weekday:'short'});
    const dateLabel = d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    return `<div class="week-day ${w.date===today?'today':''}" onclick="currentDate='${w.date}';loadSchedule('${w.date}');showTTab('t-today');" style="cursor:pointer;">
      <div class="week-day-label">${dayLabel}</div>
      <div style="font-family:'Josefin Sans',sans-serif;font-size:0.65rem;color:var(--latte);">${dateLabel}</div>
      <div class="week-day-count">${w.count}</div>
      <div style="font-family:'Josefin Sans',sans-serif;font-size:0.62rem;color:var(--latte);">appts</div>
    </div>`;
  }).join('');
}

async function loadStaffMessages() {
  if (!staffToken) return;
  try {
    const r = await fetch('/api/staff-data', { headers:{'Authorization':'Bearer '+staffToken} });
    const d = await r.json();
    if (!r.ok) return;
    const el = document.getElementById('staff-messages');
    if (!d.messages || !d.messages.length) {
      el.innerHTML = '<div style="font-family:\'Jost\',sans-serif;font-size:0.85rem;color:var(--latte);">No messages.</div>';
      return;
    }
    el.innerHTML = d.messages.map(m=>`
      <div class="msg-row">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.25rem;">
          <div class="msg-from">From: ${m.from_role==='ADMIN'?'Studio Admin':m.from_role}</div>
          <div class="msg-time-s">${new Date(m.created_at).toLocaleString()}</div>
        </div>
        <div class="msg-body">${m.body}</div>
      </div>`).join('');
  } catch (_) {}
}

window.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('zlux_staff_token');
  if (saved) {
    staffToken = saved;
    try {
      const r = await fetch('/api/staff-data', { headers:{'Authorization':'Bearer '+saved} });
      if (r.ok) {
        const d = await r.json();
        showPortal(d.staff);
      } else { localStorage.removeItem('zlux_staff_token'); }
    } catch (_) {}
  }
});

window.addEventListener('scroll',()=>{ const n=document.getElementById('nav'); if(n) n.classList.toggle('scrolled',window.scrollY>60); });
document.getElementById('hamburger')?.addEventListener('click',()=>document.getElementById('nav-mobile').classList.toggle('open'));
</script>
</body>
</html>
