<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZOLA — Team Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Josefin+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0B0B0B;--surface:#141210;--card:#1C1815;--card-hi:#221D18;
    --border:rgba(196,168,130,0.14);--border-hi:rgba(196,168,130,0.32);
    --gold:#C4A882;--gold-faint:rgba(196,168,130,0.07);
    --cream:#F5EEE8;--latte:#8B6A3E;--muted:#8B7355;--text:#F5EEE8;--success:#6ab07a;--danger:#e08a8a;
  }
  body{background:var(--bg);color:var(--text);font-family:'Josefin Sans',sans-serif;min-height:100vh;line-height:1.6}
  input,button,textarea,select{font-family:inherit;color:inherit}
  ::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:4px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pop{0%{transform:scale(0.96);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

  /* LOGIN */
  #login{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:1.5rem;
    background:radial-gradient(1200px 800px at 50% 25%,#161210,#0B0B0B)}
  .login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);padding:3rem 2.5rem;text-align:center;animation:fadeUp 0.6s ease;position:relative;overflow:hidden}
  .login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);background-size:200% 100%;animation:shimmer 3s linear infinite}
  .login-logo{font-family:'Syne',sans-serif;font-size:2.2rem;letter-spacing:0.1em;color:var(--cream)}
  .login-sub{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin:0.4rem 0 2.4rem}
  .login-label{display:block;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:0.6rem;text-align:left}
  .login-input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--cream);font-size:1.4rem;letter-spacing:0.5em;
    padding:0.85rem;outline:none;text-align:center;transition:border-color 0.2s}
  .login-input:focus{border-color:var(--gold)}
  .login-btn{width:100%;margin-top:1.5rem;background:var(--gold);color:#0B0B0B;border:none;padding:0.95rem;font-size:0.7rem;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s}
  .login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(196,168,130,0.2)}
  .login-err{color:var(--danger);font-size:0.75rem;margin-top:1rem;min-height:1.1em}

  /* SHELL */
  #app{display:none}
  .topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:1rem 1.4rem;background:rgba(11,11,11,0.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
  .brand{font-family:'Syne',sans-serif;font-size:1.3rem;letter-spacing:0.08em;color:var(--cream)}
  .who-name{font-size:0.66rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--gold)}
  .logout{background:none;border:1px solid var(--border);color:var(--muted);font-size:0.58rem;letter-spacing:0.14em;text-transform:uppercase;padding:0.45rem 0.8rem;cursor:pointer;transition:all 0.2s}
  .logout:hover{border-color:var(--gold);color:var(--gold)}
  .tabs{position:sticky;top:60px;z-index:30;display:flex;background:rgba(11,11,11,0.85);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:0 1.4rem}
  .tab{padding:0.85rem 1.2rem;font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .wrap{max-width:760px;margin:0 auto;padding:1.6rem 1.4rem 5rem}
  .panel{display:none;animation:fadeUp 0.4s ease}.panel.active{display:block}
  .label-sm{font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}

  .appt{background:var(--card);border:1px solid var(--border);padding:1.15rem 1.3rem;margin-bottom:0.7rem;display:flex;gap:1rem;align-items:flex-start;animation:fadeUp 0.35s ease both;transition:border-color 0.2s}
  .appt:hover{border-color:var(--border-hi)}
  .appt-t{min-width:76px;text-align:center;background:var(--bg);padding:0.55rem 0.3rem;border-left:2px solid var(--gold)}
  .appt-t .d{font-size:0.54rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}
  .appt-t .h{font-family:'Syne',sans-serif;font-size:1.15rem;color:var(--cream)}
  .badge-today{display:inline-block;background:var(--gold);color:#0B0B0B;font-size:0.5rem;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;padding:0.15rem 0.4rem;margin-bottom:0.3rem}
  .appt-b{flex:1;min-width:0}
  .appt-c{font-family:'Syne',sans-serif;font-size:1.1rem;color:var(--cream)}
  .appt-s{font-size:0.78rem;color:var(--muted);margin:0.1rem 0}
  .appt-p{font-size:0.74rem;color:var(--gold)}
  .appt-note{font-size:0.72rem;color:var(--muted);font-style:italic;margin-top:0.25rem}
  .row-btns{display:flex;gap:0.4rem;flex-wrap:wrap;margin-top:0.6rem}
  .mini{font-size:0.58rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.45rem 0.8rem;cursor:pointer;border:none;transition:all 0.2s}
  .mini-gold{background:var(--gold);color:#0B0B0B}
  .mini-ok{background:rgba(106,176,122,0.14);color:var(--success);border:1px solid rgba(106,176,122,0.25)}
  .mini-no{background:rgba(200,80,80,0.1);color:var(--danger);border:1px solid rgba(200,80,80,0.22)}
  .st{font-size:0.52rem;letter-spacing:0.12em;text-transform:uppercase;padding:0.15rem 0.5rem;margin-top:0.4rem;display:inline-block}
  .st-completed{background:rgba(106,176,122,0.14);color:var(--success)}
  .st-no_show{background:rgba(200,80,80,0.1);color:var(--danger)}
  .empty{text-align:center;padding:3.5rem 1rem;color:var(--muted);font-size:0.88rem}
  .empty .big{font-size:2rem;opacity:0.5;margin-bottom:0.6rem}
  .loading{text-align:center;padding:2rem;color:var(--muted);font-size:0.85rem}

  /* CHAT SHEET */
  .overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,0.75);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex;animation:fadeIn 0.2s ease}
  .sheet{background:var(--surface);border:1px solid var(--border-hi);width:100%;max-width:540px;max-height:85vh;display:flex;flex-direction:column;animation:fadeUp 0.3s ease}
  .sheet-head{padding:1rem 1.2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
  .sheet-head .n{font-family:'Syne',sans-serif;font-size:1.05rem;color:var(--cream)}
  .sheet-head .s{font-size:0.66rem;color:var(--muted)}
  .sheet-body{flex:1;overflow-y:auto;padding:1.1rem;display:flex;flex-direction:column;gap:0.55rem;min-height:200px}
  .bubble{max-width:80%;padding:0.6rem 0.85rem;font-size:0.85rem;line-height:1.5;animation:pop 0.22s ease}
  .bubble .who{font-size:0.54rem;letter-spacing:0.12em;text-transform:uppercase;opacity:0.7;margin-bottom:0.15rem}
  .b-mine{align-self:flex-end;background:var(--gold);color:#0B0B0B}
  .b-owner{align-self:flex-start;background:var(--card-hi);border:1px solid var(--border-hi);color:var(--cream)}
  .b-client{align-self:flex-start;background:var(--bg);border:1px solid var(--border);color:var(--cream)}
  .sheet-input{display:flex;gap:0.5rem;padding:0.75rem;border-top:1px solid var(--border)}
  .sheet-input input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--cream);padding:0.7rem 0.9rem;outline:none}
  .sheet-input input:focus{border-color:var(--gold)}
  .close-x{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer}

  #toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(140%);background:var(--gold);color:#0B0B0B;padding:0.75rem 1.3rem;font-size:0.74rem;font-weight:600;letter-spacing:0.06em;z-index:200;transition:transform 0.3s}
  #toast.show{transform:translateX(-50%) translateY(0)}
  @media(max-width:600px){.wrap{padding:1.1rem}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div class="login-logo"><span style="font-weight:200">Z</span><span style="font-weight:400">O</span><span style="font-weight:600">L</span><span style="font-weight:800">A</span></div>
    <div class="login-sub">Team Portal</div>
    <label class="login-label">Enter Your PIN</label>
    <input class="login-input" type="password" id="pin" inputmode="numeric" maxlength="6" placeholder="····" onkeydown="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Enter</button>
    <div class="login-err" id="err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="brand"><span style="font-weight:200">Z</span><span style="font-weight:400">O</span><span style="font-weight:600">L</span><span style="font-weight:800">A</span></div>
    <div style="text-align:right"><div class="who-name" id="who">—</div></div>
    <button class="logout" onclick="logout()">Log Out</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-t="schedule" onclick="showTab('schedule')">My Schedule</button>
    <button class="tab" data-t="chats" onclick="showTab('chats')">Client Chats</button>
  </div>
  <div class="wrap">
    <section class="panel active" id="panel-schedule">
      <div class="label-sm">Upcoming Appointments</div>
      <div id="sched"><div class="loading">Loading…</div></div>
    </section>
    <section class="panel" id="panel-chats">
      <div class="label-sm">Your Client Conversations</div>
      <div id="chats"><div class="loading">Loading…</div></div>
    </section>
  </div>
</div>

<!-- CHAT SHEET -->
<div class="overlay" id="sheet">
  <div class="sheet">
    <div class="sheet-head">
      <div><div class="n" id="sheet-name">—</div><div class="s" id="sheet-sub"></div></div>
      <button class="close-x" onclick="closeSheet()">×</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
    <div class="sheet-input">
      <input id="sheet-msg" placeholder="Message the client…" onkeydown="if(event.key==='Enter')sendMsg()" />
      <button class="mini mini-gold" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
let MID=null,PIN=null,NAME=null;
let schedule=[];
let activeAppt=null;

function login(){
  const pin=document.getElementById('pin').value.trim();const err=document.getElementById('err');err.textContent='';
  if(!pin)return;
  fetch('/api/team?action=login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'login',pin})})
    .then(r=>r.json().then(d=>({ok:r.ok,d})))
    .then(({ok,d})=>{
      if(!ok||!d.ok){err.textContent='Invalid PIN. Try again.';return;}
      MID=d.member_id;PIN=pin;NAME=d.name;
      sessionStorage.setItem('zt',JSON.stringify({MID,PIN,NAME}));
      enter();
    }).catch(()=>err.textContent='Connection error.');
}
function logout(){sessionStorage.removeItem('zt');location.reload();}
function enter(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('who').textContent=NAME;
  loadSchedule();
}
function showTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.t===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='schedule')loadSchedule();
  if(t==='chats')loadChats();
}

function fmtTime(t){const[h,m]=t.split(':').map(Number);const ap=h>=12?'PM':'AM';const hh=h>12?h-12:(h===0?12:h);return hh+':'+String(m).padStart(2,'0')+' '+ap;}
function fmtDate(ds){return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}

async function loadSchedule(){
  const el=document.getElementById('sched');el.innerHTML='<div class="loading">Loading…</div>';
  try{
    const r=await fetch('/api/team?action=schedule&member_id='+MID+'&pin='+PIN);
    const d=await r.json();schedule=d.schedule||[];
    renderSchedule();
  }catch{el.innerHTML='<div class="empty">Connection error.</div>';}
}
function renderSchedule(){
  const el=document.getElementById('sched');
  if(!schedule.length){el.innerHTML='<div class="empty"><div class="big">📅</div>No upcoming appointments.<br>New bookings from Zahra appear here.</div>';return;}
  const today=new Date().toISOString().slice(0,10);
  el.innerHTML=schedule.map((a,i)=>`
    <div class="appt" style="animation-delay:${i*0.04}s">
      <div class="appt-t">${a.date===today?'<div class="badge-today">Today</div>':''}<div class="d">${fmtDate(a.date)}</div><div class="h">${fmtTime(a.time)}</div></div>
      <div class="appt-b">
        <div class="appt-c">${esc(a.client_name||'Client')}</div>
        <div class="appt-s">${esc(a.service||'')}</div>
        ${a.client_phone?`<div class="appt-p">${esc(a.client_phone)}</div>`:''}
        ${a.notes?`<div class="appt-note">${esc(a.notes)}</div>`:''}
        ${a.status!=='scheduled'?`<span class="st st-${a.status}">${a.status.replace('_',' ')}</span>`:''}
        <div class="row-btns">
          <button class="mini mini-gold" onclick="openSheet(${a.id})">💬 Chat</button>
          <button class="mini mini-ok" onclick="setStatus(${a.id},'completed')">✓ Complete</button>
          <button class="mini mini-no" onclick="setStatus(${a.id},'no_show')">No-Show</button>
        </div>
      </div>
    </div>`).join('');
}
async function setStatus(id,status){
  if(!confirm(status==='completed'?'Mark this appointment complete?':'Mark as a no-show?'))return;
  await fetch('/api/team?action=status',{method:'PUT',headers:hdr(),body:JSON.stringify({action:'status',appointment_id:id,status})});
  toast(status==='completed'?'Marked complete':'No-show recorded');loadSchedule();
}

async function loadChats(){
  const el=document.getElementById('chats');el.innerHTML='<div class="loading">Loading…</div>';
  try{
    const r=await fetch('/api/team?action=schedule&member_id='+MID+'&pin='+PIN);
    const d=await r.json();const list=d.schedule||[];schedule=list;
    if(!list.length){el.innerHTML='<div class="empty"><div class="big">💬</div>No conversations yet.</div>';return;}
    el.innerHTML=list.map(a=>`
      <div class="appt" style="cursor:pointer" onclick="openSheet(${a.id})">
        <div class="appt-t"><div class="d">${fmtDate(a.date)}</div><div class="h">${fmtTime(a.time)}</div></div>
        <div class="appt-b"><div class="appt-c">${esc(a.client_name||'Client')}</div><div class="appt-s">${esc(a.service||'')}</div>
        <div style="font-size:0.68rem;color:var(--gold);margin-top:0.3rem">Tap to open chat →</div></div>
      </div>`).join('');
  }catch{el.innerHTML='<div class="empty">Connection error.</div>';}
}

function openSheet(id){
  activeAppt=schedule.find(a=>a.id===id)||null;
  if(!activeAppt)return;
  document.getElementById('sheet-name').textContent=activeAppt.client_name||'Client';
  document.getElementById('sheet-sub').textContent=(activeAppt.service||'')+' · '+fmtDate(activeAppt.date)+' '+fmtTime(activeAppt.time);
  document.getElementById('sheet').classList.add('open');
  loadSheet();
}
function closeSheet(){document.getElementById('sheet').classList.remove('open');activeAppt=null;}
async function loadSheet(){
  const body=document.getElementById('sheet-body');body.innerHTML='<div class="loading">Loading…</div>';
  const r=await fetch('/api/team?action=chat&member_id='+MID+'&pin='+PIN+'&appointment_id='+activeAppt.id);
  const d=await r.json();renderSheet(d.messages||[]);
}
function renderSheet(msgs){
  const body=document.getElementById('sheet-body');
  if(!msgs.length){body.innerHTML='<div class="empty" style="padding:2rem">No messages yet. Send the first one 👋</div>';return;}
  body.innerHTML=msgs.map(m=>{
    const cls=m.sender==='team'?'b-mine':m.sender==='owner'?'b-owner':'b-client';
    const who=m.sender==='team'?'You':m.sender==='owner'?'Zahra (Studio)':esc(m.sender_name||'Client');
    return `<div class="bubble ${cls}"><div class="who">${who}</div>${esc(m.body)}</div>`;
  }).join('');
  body.scrollTop=body.scrollHeight;
}
async function sendMsg(){
  const inp=document.getElementById('sheet-msg');const body=inp.value.trim();
  if(!body||!activeAppt)return;inp.value='';
  await fetch('/api/team?action=chat',{method:'POST',headers:hdr(),body:JSON.stringify({action:'chat',appointment_id:activeAppt.id,body})});
  loadSheet();
}

function hdr(){return{'Content-Type':'application/json','X-Team-Id':String(MID),'X-Team-Pin':PIN};}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}

(function(){const s=sessionStorage.getItem('zt');if(s){try{const o=JSON.parse(s);MID=o.MID;PIN=o.PIN;NAME=o.NAME;enter();}catch{}}})();
</script>
</body>
</html>
